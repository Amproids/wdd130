<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Basic HTML and CSS Quiz</title>
        <meta name="description" content="Basic HTML and CSS Quiz">
        <meta name="author" content="Andrew Parry">
        <link rel="stylesheet" href="styles/quiz.css">
    </head>
    <body>
        <form>
            <h1>Basic HTML and CSS Quiz</h1>
            <fieldset>
                <label for="q1">What does the acronym CSS stand for?</label>
                <input type="text" id="q1" name="q1">
                <label for="q2">How are id and class attributes selected in CSS?</label>
                <textarea rows="4" id="q2" name="q2"></textarea>
                <label for="q3">Which of the following is a valid CSS comment?</label>
                <select id="q3" name="q3">
                    <option value="" selected disabled>Choose One</option>
                    <option value="single quotes">'comment'</option>
                    <option value="correct">/* comment */</option>
                    <option value="hashtag">#comment</option>
                    <option value="forward slash">//comment</option>
                </select>
                <label for="q4"> What is 3+3*3-3?</label>
                <input type="number" id="q4" name="q4">
            </fieldset>
        </form>
    </body>
</html>
